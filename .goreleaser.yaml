version: 2

project_name: splitdns

builds:
  - id: splitdns
    main: .
    binary: splitdns
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X splitdns/internal/cli.Version={{.Version}}

archives:
  - id: default
    ids: [splitdns]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      # Generated by `go run ./tools/genman` (the release workflow runs it).
      - man/splitdns.1.gz
      # Generated by `go run ./tools/gencompletions` (the release workflow runs it).
      # Shipped in the tar.gz so the Homebrew formula can install them.
      - completions/splitdns.bash
      - completions/_splitdns.zsh

nfpms:
  - id: splitdns
    ids: [splitdns]
    package_name: splitdns
    vendor: Miista
    homepage: https://github.com/Miista/homebrew-splitdns
    maintainer: Miista <noreply@users.noreply.github.com>
    description: Generate split-horizon DNS (Pi-hole/dnsmasq) and Caddy site blocks from a declarative services.yaml
    license: MIT
    formats: [deb]
    bindir: /usr/bin
    # curl is used by `splitdns measure` (shells out to the embedded measure.sh).
    recommends:
      - curl
    contents:
      - src: man/splitdns.1.gz
        dst: /usr/share/man/man1/splitdns.1.gz
      # Shell completions (generated by `go run ./tools/gencompletions`).
      - src: completions/splitdns.bash
        dst: /usr/share/bash-completion/completions/splitdns
      - src: completions/_splitdns.zsh
        dst: /usr/share/zsh/vendor-completions/_splitdns

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  # Drop noise that isn't a user-facing change: version/chore bumps, docs,
  # tests, CI, and the automated Homebrew formula commit goreleaser itself
  # pushes each release.
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^Brew formula update"
      - "^Merge "
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: Others
      order: 999

brews:
  - name: splitdns
    repository:
      owner: Miista
      name: homebrew-splitdns
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    homepage: https://github.com/Miista/homebrew-splitdns
    description: Generate split-horizon DNS (Pi-hole/dnsmasq) and Caddy site blocks from a declarative services.yaml
    license: MIT
    install: |
      bin.install "splitdns"
      man1.install "man/splitdns.1.gz"
      bash_completion.install "completions/splitdns.bash" => "splitdns"
      zsh_completion.install "completions/_splitdns.zsh" => "_splitdns"
    test: |
      assert_match "splitdns", shell_output("#{bin}/splitdns version")
