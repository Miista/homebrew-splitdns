version: 2

project_name: shd

builds:
  - id: shd
    main: .
    binary: shd
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X shd/internal/cli.Version={{.Version}}

archives:
  - id: default
    ids: [shd]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

brews:
  - name: shd
    repository:
      owner: Miista
      name: homebrew-shd
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    homepage: https://github.com/Miista/homebrew-shd
    description: Generate split-horizon DNS (Pi-hole/dnsmasq) and Caddy site blocks from a declarative services.yaml
    license: MIT
    install: |
      bin.install "shd"
    test: |
      assert_match "shd", shell_output("#{bin}/shd version")
