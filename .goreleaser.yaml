version: 2

project_name: hemma

builds:
  - id: hemma
    main: .
    binary: hemma
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    flags: [-trimpath]
    ldflags:
      - -s -w -X hemma/internal/cli.Version={{.Version}}

archives:
  - id: default
    ids: [hemma]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      # Generated by `go run ./tools/genman` (the release workflow runs it).
      - man/hemma.1.gz
      # Generated by `go run ./tools/gencompletions` (the release workflow runs it).
      # Shipped in the tar.gz so the Homebrew formula can install them.
      # Both files register the `splitdns` alias alongside `hemma`.
      - completions/hemma.bash
      - completions/_hemma.zsh

nfpms:
  - id: hemma
    ids: [hemma]
    package_name: hemma
    vendor: Miista
    homepage: https://github.com/Miista/homebrew-splitdns
    maintainer: Miista <noreply@users.noreply.github.com>
    description: Generate split-horizon DNS (Pi-hole/dnsmasq), Caddy site blocks, and auth-provider config from a declarative services.yaml
    license: MIT
    formats: [deb]
    bindir: /usr/bin
    # apt transition from the pre-rename package: hemma replaces splitdns and
    # ships a /usr/bin/splitdns symlink so the old command keeps working.
    provides:
      - splitdns
    replaces:
      - splitdns
    conflicts:
      - splitdns
    # curl is used by `hemma measure` (shells out to the embedded measure.sh).
    recommends:
      - curl
    contents:
      # Backwards-compatible alias: `splitdns` keeps working for all commands.
      - src: /usr/bin/hemma
        dst: /usr/bin/splitdns
        type: symlink
      - src: man/hemma.1.gz
        dst: /usr/share/man/man1/hemma.1.gz
      - src: /usr/share/man/man1/hemma.1.gz
        dst: /usr/share/man/man1/splitdns.1.gz
        type: symlink
      # Shell completions (generated by `go run ./tools/gencompletions`).
      # The generated files register both `hemma` and the `splitdns` alias;
      # the bash symlink makes bash-completion lazy-loading find it under the
      # alias name too (zsh reads the #compdef line, no symlink needed).
      - src: completions/hemma.bash
        dst: /usr/share/bash-completion/completions/hemma
      - src: /usr/share/bash-completion/completions/hemma
        dst: /usr/share/bash-completion/completions/splitdns
        type: symlink
      - src: completions/_hemma.zsh
        dst: /usr/share/zsh/vendor-completions/_hemma

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  # Drop noise that isn't a user-facing change: version/chore bumps, docs,
  # tests, CI, and the automated Homebrew formula commit goreleaser itself
  # pushes each release.
  filters:
    exclude:
      - "^chore:"
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^Brew formula update"
      - "^Merge "
  groups:
    - title: Features
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: Bug fixes
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: Others
      order: 999

brews:
  - name: hemma
    repository:
      owner: Miista
      name: homebrew-splitdns
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    homepage: https://github.com/Miista/homebrew-splitdns
    description: Generate split-horizon DNS (Pi-hole/dnsmasq), Caddy site blocks, and auth-provider config from a declarative services.yaml
    license: MIT
    install: |
      bin.install "hemma"
      # Backwards-compatible alias: `splitdns` keeps working for all commands.
      bin.install_symlink "hemma" => "splitdns"
      man1.install "man/hemma.1.gz"
      bash_completion.install "completions/hemma.bash" => "hemma"
      zsh_completion.install "completions/_hemma.zsh" => "_hemma"
    test: |
      assert_match "hemma", shell_output("#{bin}/hemma version")
