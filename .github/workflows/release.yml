name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate man page
        run: go run ./tools/genman

      - name: Generate shell completions
        run: go run ./tools/gencompletions

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          # The repo IS the Homebrew tap (Miista/homebrew-splitdns), so GoReleaser
          # self-publishes Formula/ back into this same repo — the default
          # GITHUB_TOKEN suffices, no PAT needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish this release's .debs to the shared Cloudsmith apt repo
      # (guldmund/stable). Each tool pushes only its own artifacts; Cloudsmith
      # indexes and signs the repo server-side, so there is no shared build job.
      # Two-step raw API per file: PUT the binary (returns an identifier), then
      # POST to finalize it as a deb under debian/any-version.
      #
      # distribution MUST be debian/any-version, NOT any-distro/any-version:
      # Cloudsmith accepts an "any-distro" upload but does not publish an apt
      # index under deb/any-distro/ (clients 404 on the Release file). It only
      # serves under real distro slugs. debian/any-version is codename-agnostic,
      # so one upload installs on any Debian/Raspbian/Ubuntu client. The client
      # source line is correspondingly:
      #   deb [...] https://dl.cloudsmith.io/public/guldmund/stable/deb/debian any-version main
      - name: Publish debs to Cloudsmith
        env:
          CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}
        run: |
          set -euo pipefail
          for deb in dist/*.deb; do
            echo "Uploading $(basename "$deb")"
            id=$(curl -fsSL -X PUT \
              -H "X-Api-Key: $CLOUDSMITH_API_KEY" \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$deb" \
              "https://upload.cloudsmith.io/guldmund/stable/$(basename "$deb")" \
              | python3 -c "import sys,json;print(json.load(sys.stdin)['identifier'])")
            curl -fsSL -X POST \
              -H "X-Api-Key: $CLOUDSMITH_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"package_file\":\"$id\",\"distribution\":\"debian/any-version\"}" \
              "https://api.cloudsmith.io/v1/packages/guldmund/stable/upload/deb/" \
              > /dev/null
            echo "  published $(basename "$deb")"
          done
