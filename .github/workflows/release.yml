name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          # The repo IS the Homebrew tap (Miista/homebrew-sd), so GoReleaser
          # self-publishes Formula/ back into this same repo — the default
          # GITHUB_TOKEN suffices, no PAT needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Rebuild the shared apt repo (docker-pin + splitdns, latest release of each)
  # and deploy it to Cloudflare Pages (apt.guldmund.dk). Stateless: the GitHub
  # releases are the source of truth; each publish is a full fresh tree.
  # The same job exists in Miista/homebrew-sd — keep them in sync.
  apt-repo:
    needs: release
    if: always() && !cancelled() && !failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Install reprepro
        run: sudo apt-get update -q && sudo apt-get install -y -q reprepro

      - name: Import GPG signing key
        run: echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Download latest .debs from both repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo Miista/homebrew-docker-pin --pattern '*.deb' --dir /tmp/debs
          gh release download --repo Miista/homebrew-sd --pattern '*.deb' --dir /tmp/debs

      - name: Build apt repository
        run: |
          set -euo pipefail
          mkdir -p site/conf
          cat > site/conf/distributions <<'EOF'
          Origin: apt.guldmund.dk
          Label: guldmund
          Codename: stable
          Architectures: amd64 arm64
          Components: main
          Description: apt repository for guldmund.dk tools
          SignWith: yes
          EOF
          reprepro --basedir site includedeb stable /tmp/debs/*.deb
          gpg --armor --export > site/guldmund-archive-keyring.asc
          rm -rf site/conf site/db
          cat > site/setup.sh <<'EOF'
          #!/bin/sh
          # Adds the apt.guldmund.dk repository. Run as root:
          #   curl -fsSL https://apt.guldmund.dk/setup.sh | sudo sh
          set -eu
          [ "$(id -u)" -eq 0 ] || { echo "run as root: curl -fsSL https://apt.guldmund.dk/setup.sh | sudo sh" >&2; exit 1; }
          install -d /etc/apt/keyrings
          curl -fsSL https://apt.guldmund.dk/guldmund-archive-keyring.asc -o /etc/apt/keyrings/guldmund-archive-keyring.asc
          echo "deb [signed-by=/etc/apt/keyrings/guldmund-archive-keyring.asc] https://apt.guldmund.dk stable main" > /etc/apt/sources.list.d/guldmund.list
          apt-get update -q
          echo "guldmund repository added. Install with: sudo apt install docker-pin splitdns"
          EOF
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en"><head><meta charset="utf-8"><title>apt.guldmund.dk</title>
          <style>body{font-family:system-ui,sans-serif;max-width:44rem;margin:3rem auto;padding:0 1rem;line-height:1.5}pre{background:#f4f4f4;padding:1rem;overflow-x:auto}</style>
          </head><body>
          <h1>apt.guldmund.dk</h1>
          <p>Signed apt repository for guldmund.dk tools:</p>
          <ul>
          <li><a href="https://github.com/Miista/homebrew-docker-pin">docker-pin</a> — pin Docker Compose images to tag + digest</li>
          <li><a href="https://github.com/Miista/homebrew-sd">splitdns</a> — split-horizon DNS + Caddy config from services.yaml</li>
          </ul>
          <h2>Install (Debian/Ubuntu)</h2>
          <pre>curl -fsSL https://apt.guldmund.dk/setup.sh | sudo sh
          sudo apt install docker-pin splitdns</pre>
          <p>Or do the repo setup explicitly:</p>
          <pre>sudo install -d /etc/apt/keyrings
          curl -fsSL https://apt.guldmund.dk/guldmund-archive-keyring.asc \
            | sudo tee /etc/apt/keyrings/guldmund-archive-keyring.asc > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/guldmund-archive-keyring.asc] https://apt.guldmund.dk stable main" \
            | sudo tee /etc/apt/sources.list.d/guldmund.list
          sudo apt update &amp;&amp; sudo apt install docker-pin splitdns</pre>
          </body></html>
          EOF

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler pages project create apt-guldmund --production-branch=main 2>/dev/null || true
          npx --yes wrangler pages deploy site --project-name=apt-guldmund --branch=main --commit-dirty=true
