name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          # The repo IS the Homebrew tap (Miista/homebrew-sdm), so GoReleaser
          # self-publishes Formula/ back into this same repo — the default
          # GITHUB_TOKEN suffices, no PAT needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
